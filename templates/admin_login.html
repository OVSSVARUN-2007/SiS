{% extends "base.html" %}
{% block title %}Admin Login{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="card auth-card narrow">
    <h1 class="title" style="font-size: 1.9rem;">Admin Login</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    {% if message %}
      <div class="success">{{ message }}</div>
    {% endif %}
    <form method="post" action="/admin/login">
      <label>Email</label>
      <input type="email" name="email" required />
      <label>Password</label>
      <input type="password" name="password" required />
      <button class="btn btn-primary btn-block" type="submit">Login</button>
    </form>
    <div class="meta-links"><a href="/admin/signup">Create Admin Account</a></div>
    <div class="meta-links"><a href="/forgot-password">Forgot password? Reset with OTP</a></div>
    <div class="meta-links"><a href="/login">Student Login</a></div>
  </div>
</div>
{% endblock %}
