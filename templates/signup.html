{% extends "base.html" %}
{% block title %}Student Signup{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="card auth-card">
    <h1 class="title" style="font-size: 1.9rem;">Create Student Account</h1>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    <form method="post" action="/signup">
      <div class="grid-2">
        <div>
          <label>Full Name</label>
          <input type="text" name="full_name" required />
        </div>
        <div>
          <label>Email</label>
          <input type="email" name="email" required />
        </div>
        <div>
          <label>Password</label>
          <input type="password" name="password" required />
        </div>
        <div>
          <label>Phone</label>
          <input type="tel" name="phone" />
        </div>
        <div>
          <label>Gender</label>
          <select name="gender">
            <option value="">Select</option>
            <option value="male">Male</option>
            <option value="female">Female</option>
            <option value="other">Other</option>
          </select>
        </div>
        <div>
          <label>Date of Birth</label>
          <input type="date" name="date_of_birth" />
        </div>
        <div>
          <label>Department</label>
          <input type="text" name="department" />
        </div>
        <div>
          <label>Academic Year</label>
          <input type="number" min="1" max="6" name="academic_year" />
        </div>
        <div>
          <label>Section</label>
          <input type="text" name="section" />
        </div>
      </div>
      <button class="btn btn-primary btn-block" type="submit">Create Account</button>
    </form>
    <div class="meta-links">Already have an account? <a href="/login">Login</a></div>
  </div>
</div>
{% endblock %}
