{% extends "base.html" %}
{% block title %}Forgot Password{% endblock %}
{% block body %}
<div class="auth-wrap">
  <div class="card auth-card narrow">
    <h1 class="title" style="font-size: 1.9rem;">Forgot Password</h1>
    <p class="subtitle">Enter your email or phone number to receive an OTP.</p>
    {% if error %}
      <div class="error">{{ error }}</div>
    {% endif %}
    {% if message %}
      <div class="success">{{ message }}</div>
    {% endif %}
    <form method="post" action="/forgot-password">
      <label>Email or Phone</label>
      <input type="text" name="identifier" placeholder="Enter email or phone number" required />
      <button class="btn btn-primary btn-block" type="submit">Send OTP</button>
    </form>
    <div class="meta-links"><a href="/login">Back to student login</a></div>
    <div class="meta-links"><a href="/admin/login">Back to admin login</a></div>
  </div>
</div>
{% endblock %}
